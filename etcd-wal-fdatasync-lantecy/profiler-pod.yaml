apiVersion: v1
kind: Pod
metadata:
  name: profiler
  namespace: default
spec:
  # Set nodeName to the target node:
  #   oc get nodes -o wide
  #   Then edit this field before applying.
  nodeName: REPLACE_WITH_NODE_NAME
  tolerations:
  - operator: Exists
  hostPID: true
  hostNetwork: true
  containers:
  - name: profiler
    image: registry.fedoraproject.org/fedora:42
    command: ["sleep", "infinity"]
    securityContext:
      privileged: true
    volumeMounts:
    - name: host
      mountPath: /host
    - name: modules
      mountPath: /lib/modules
    - name: debug
      mountPath: /sys/kernel/debug
  volumes:
  - name: host
    hostPath:
      path: /
  - name: modules
    hostPath:
      path: /lib/modules
  - name: debug
    hostPath:
      path: /sys/kernel/debug
